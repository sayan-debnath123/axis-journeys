<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Travel Explorer</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
        }

        header {
            background: #0077b6;
            color: white;
            text-align: center;
            padding: 25px;
        }

        .contact-container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .contact-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #0077b6;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #0077b6;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #005f8a;
        }

        .contact-info {
            margin-top: 25px;
            text-align: center;
            color: #555;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Axis Journeys</h1>
        <p>Contact Us</p>
    </header>

    <div class="contact-container">
        <h2>Get in Touch</h2>

        <form>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" placeholder="Subject">
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" placeholder="Write your message here..." required></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>

        <div class="contact-info">
            <p>Email: explore@axisjourneys.in</p>
            <p>Phone: +91 8358881308</p>
            <p>Address: 3rd Floor, KURSI CO-WORK, LK Corporate and Logistics Park,Block-E,Dumartarai,New Dhamtari Road, Raipur,492015</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Axis Journeys. All Rights Reserved.</p>
    </footer>

</body>
</html>
